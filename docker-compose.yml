version: "3.9"

services:
  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hbu_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: house_by_us
      MYSQL_USER: hbu_app
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hbu_app", "-pchangeme"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ────────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder   # use builder stage for dev (includes tsx watch)
    container_name: hbu_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: hbu_app
      DB_PASSWORD: changeme
      DB_NAME: house_by_us
      # Override these in a .env file or shell environment:
      SESSION_SECRET: ${SESSION_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:4000/auth/google/callback
      AWS_REGION: ${AWS_REGION:-af-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-house-by-us-media}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL}
      CLIENT_URL: http://localhost:5173
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app/backend   # live reload in dev
    command: ["pnpm", "--filter", "@house-by-us/server", "dev"]

  # ── Adminer (DB GUI) — optional, remove in production ─────────────────────────
  adminer:
    image: adminer:latest
    container_name: hbu_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  mysql_data:
